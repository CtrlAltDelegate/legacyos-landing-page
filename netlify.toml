[build]
  base    = "client"
  command = "npm run build"
  publish = "client/dist"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback — all routes serve index.html so React Router handles them
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Proxy /api/* to the Railway backend
# Set VITE_API_URL in Netlify's environment variables (no trailing slash)
[[redirects]]
  from   = "/api/*"
  to     = ":VITE_API_URL/api/:splat"
  status = 200
  force  = true
