[build]
  base    = "client"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback — all routes serve index.html so React Router handles them
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Proxy /api/* to the Railway backend (set VITE_API_URL in Netlify env vars)
# If you use the Vite proxy (dev only), this is the production equivalent.
[[redirects]]
  from   = "/api/*"
  to     = ":VITE_API_URL/api/:splat"
  status = 200
  force  = true
